        // Cookie Banner Component
        function CookieBanner({ onPrivacyClick }) {
            const [showCookies, setShowCookies] = useState(true);

            React.useEffect(() => {
                // Sprawdzam czy użytkownik już zaakceptował cookies
                const cookiesAccepted = localStorage.getItem('cookiesAccepted');
                if (cookiesAccepted) {
                    setShowCookies(false);
                }
            }, []);

            const handleAccept = () => {
                localStorage.setItem('cookiesAccepted', 'true');
                setShowCookies(false);
            };

            if (!showCookies) return null;

            return (
                <div className="fixed bottom-0 left-0 right-0 bg-gray-900 text-white p-4 md:p-6 z-40 border-t border-gray-700">
                    <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">

                        >
                            Akceptuję

                </div>
            );

function App() {
            const [currentPage, setCurrentPage] = useState('home');
                const pathMap = {
                    '': 'home',
                    '/': 'home',
                    '/o-mnie': 'home',
                    '/aktualności': 'news',
                    '/aktualnosci': 'news',
                    '/news': 'news',
                    '/poradniki': 'guides',
                    '/guides': 'guides',
                    '/materiały': 'materials',
                    '/materialy': 'materials', 
                    '/materials': 'materials',
                    '/gwarancja-jakosci': 'home', 
                    '/kontakt': 'home',         
                    '/warunki-świadczenia-usług': 'terms',
                    '/warunki-swiadczenia-uslug': 'terms', 
                    '/terms': 'terms',
                    '/polityka-prywatności': 'privacy',
                    '/polityka-prywatnosci': 'privacy', 
                    '/privacy': 'privacy',
                    '/standardy-ochrony-małoletnich': 'child-protection',
                    '/standardy-ochrony-maloletnich': 'child-protection', 
                    '/child-protection': 'child-protection'
                };

            const pageToPath = {
                'home': '/',
                'news': '/aktualnosci',
                'guides': '/poradniki',
                'materials': '/materialy',
                'terms': '/warunki-swiadczenia-uslug',
                'privacy': '/polityka-prywatnosci',
                'child-protection': '/standardy-ochrony-maloletnich'
            };

            const getPageFromPathname = () => {
                const pathname = decodeURI(window.location.pathname); // Dodane decodeURI()
                const cleanPath = pathname === '/' ? '/' : pathname;
                return pathMap[cleanPath] || 'home';
            };

            // Zmiana strony z aktualizacją URL (bez opóźnień!)
            const handlePageChange = (newPage) => {
                setCurrentPage(newPage);
                const path = pageToPath[newPage] || '/';
                window.history.pushState({ page: newPage }, '', path);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // Tylko na początek - czytaj URL z pathname
            React.useEffect(() => {
                const pathname = decodeURI(window.location.pathname); // Dodane decodeURI()
                const cleanPath = pathname === '/' ? '/' : pathname;
                const initialPage = pathMap[cleanPath] || 'home';
                setCurrentPage(initialPage);
                
                if (cleanPath === '/o-mnie') {
                    setTimeout(() => document.getElementById('about')?.scrollIntoView({ behavior: 'smooth' }), 300);
                } else if (cleanPath === '/gwarancja-jakosci') {
                    setTimeout(() => document.getElementById('pricing')?.scrollIntoView({ behavior: 'smooth' }), 300);
                } else if (cleanPath === '/kontakt') {
                    setTimeout(() => document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth' }), 300);
                }
                // --- KONIEC FRAGMENTU ---


                // Back/Forward button support
                const handlePopState = (e) => {
                    const page = e.state?.page || 'home';
                    setCurrentPage(page);
                };
                
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            React.useEffect(() => {
                lucide.createIcons();
            });

            return (
                <div className="min-h-screen bg-white">
                    {/* Przekazujemy funkcje do nawigacji */}
                    <Navigation currentPage={currentPage} onPageChange={handlePageChange} />
                    
                    {/* Widok Strony Głównej */}
                    {currentPage === 'home' && (
                        <>
                            <Hero />
                            <About />
                            {/* Guides zostało usunięte z tej listy, aby działało jako osobna podstrona */}
                            <Pricing />
                            <Contact />
                        </>
                    )}

                    {/* Widok Aktualności (jako "podstrona") */}
                    {currentPage === 'news' && (
                        <News onBack={() => handlePageChange('home')} />
                    )}

                    {/* Widok Poradników (jako "podstrona") */}
                    {currentPage === 'guides' && (
                        <Guides onBack={() => handlePageChange('home')} />
                    )}
                    {currentPage === 'materials' && (
                         <Materials onBack={() => handlePageChange('home')} />
                    )}
                    {currentPage === 'terms' && (
                        <Terms onBack={() => handlePageChange('home')} />
                    )}
                    {currentPage === 'privacy' && (
                        <Privacy onBack={() => handlePageChange('home')} />
                    )}
                    {currentPage === 'child-protection' && (
                        <ChildProtection onBack={() => handlePageChange('home')} />
                    )}
                    <CookieBanner onPrivacyClick={() => handlePageChange('privacy')} />
                    <Footer onPageChange={handlePageChange} />
                </div>
            );
        }

        // Render the app
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
